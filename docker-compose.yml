services:
  app:
    build:
      dockerfile: Dockerfile
    image: subscribe-master-app-1:latest
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: prod

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: subscribe_master
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 9779
    ports:
      - '5432:5432'