spring:
  application:
    name: Subscribe Master

  profiles:
    active: dev

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
